<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Plastic Footprint Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Plastic Footprint</h3>
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="calculator.html">Plastic Calculator</a></li>
                    <li><a href="#profile" class="active">Profile</a></li>
                    <li><a href="#" id="logout">Logout</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="page-header">
                <h1>User Profile</h1>
            </header>
            <div class="profile-section">
                <div class="profile-photo">
                    <img id="profileImg" src="https://via.placeholder.com/150" alt="Profile Photo">
                    <input type="file" id="photoUpload" accept="image/*" style="display: none;">
                    <button id="changePhoto" class="btn-secondary">Change Photo</button>
                </div>
                <div class="profile-info">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" readonly>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" readonly>
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" readonly>
                    </div>
                    <div class="form-group">
                        <label for="createdDate">Account Created</label>
                        <input type="text" id="createdDate" readonly>
                    </div>
                    <button id="editBtn" class="btn-primary">Edit Profile</button>
                    <button id="saveBtn" class="btn-primary" style="display: none;">Save Changes</button>
                    <button id="cancelBtn" class="btn-secondary" style="display: none;">Cancel</button>
                </div>
            </div>
            <div class="stats-section">
                <h2>Your Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Monthly Plastic Usage</h3>
                        <p id="monthlyUsage">0 items</p>
                    </div>
                    <div class="stat-card">
                        <h3>Yearly Plastic Usage</h3>
                        <p id="yearlyUsage">0 items</p>
                    </div>
                    <div class="stat-card">
                        <h3>Eco Score</h3>
                        <p id="ecoScore">Calculating...</p>
                    </div>
                </div>
            </div>
            <div class="password-section">
                <h2>Change Password</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmNewPassword">Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">Change Password</button>
                </form>
            </div>
        </main>
    </div>
    <script src="profile.js"></script>
</body>
</html>
